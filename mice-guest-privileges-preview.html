<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Macao MICE Plus 禮遇合作伙伴計劃 | Design Preview</title>
  <meta name="description" content="Macao MICE Plus 禮遇合作伙伴計劃 design preview page.">
  <style>
    :root{
      --red:#d6281f;
      --cream:#F7F6F0;
      --black:#000000;
      --ink:#161616;
      --muted:#6f6b64;
      --line:rgba(0,0,0,.1);
      --white:#fff;
      --shadow:0 28px 80px rgba(0,0,0,.14);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:#f3f3f3;color:var(--black);font-family:Inter,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;overflow-x:hidden}
    body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 82% 12%,rgba(214,40,31,.13),transparent 28%),radial-gradient(circle at 12% 90%,rgba(0,0,0,.08),transparent 24%);pointer-events:none;z-index:-2}
    body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.7),transparent 78%);pointer-events:none;z-index:-1}
    header{position:sticky;top:0;z-index:20;backdrop-filter:blur(18px);background:rgba(247,246,240,.82);border-bottom:1px solid var(--line)}
    .nav{max-width:1180px;margin:auto;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:20px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.02em}
    .brand-mark{width:34px;height:34px;border-radius:50%;background:var(--red);position:relative;box-shadow:0 10px 28px rgba(214,40,31,.28)}
    .brand-mark:after{content:"";position:absolute;inset:9px;border:2px solid #fff;border-radius:50%}
    .nav-note{font-size:13px;color:var(--muted);white-space:nowrap}
    main{max-width:1180px;margin:auto;padding:28px 22px 80px}
    .hero{display:grid;grid-template-columns:1.08fr .92fr;gap:34px;align-items:end;min-height:330px;padding:18px 0 42px}
    .eyebrow{display:inline-flex;gap:10px;align-items:center;padding:8px 12px;border:1px solid rgba(214,40,31,.24);border-radius:999px;color:var(--red);font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.52)}
    .eyebrow:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--red)}
    h1{margin:22px 0 18px;line-height:1.02;letter-spacing:-.04em;text-wrap:balance;word-break:keep-all;overflow-wrap:normal}
    h1 .title-line{display:block;color:var(--red);white-space:nowrap;letter-spacing:-.03em;font-size:clamp(42px,6.6vw,78px)}
    h1 .title-line.short{color:var(--black);font-size:clamp(40px,6.2vw,74px)}
    @media(max-width:760px){h1 .title-line{font-size:clamp(38px,12vw,64px)}h1 .title-line.short{font-size:clamp(38px,11vw,60px)}}
    @media(max-width:430px){h1 .title-line{font-size:clamp(32px,10.8vw,48px)}h1 .title-line.short{font-size:clamp(32px,10.2vw,46px)}}
    .subtitle{font-size:clamp(18px,2.2vw,28px);line-height:1.3;margin:0;color:#282521;font-weight:750}
    .desc{max-width:680px;color:var(--muted);font-size:16px;line-height:1.85;margin:18px 0 0}
    .hero-card{border:1px solid var(--line);border-radius:var(--radius);background:rgba(255,255,255,.58);box-shadow:var(--shadow);padding:28px;position:relative;overflow:hidden}
    .hero-card:before{content:"";position:absolute;right:-70px;top:-70px;width:210px;height:210px;border:22px solid rgba(214,40,31,.1);border-radius:50%}
    .preview-label{position:relative;font-size:14px;color:var(--muted);line-height:1.8}
    .preview-label b{display:block;color:var(--black);font-size:22px;margin-bottom:8px}
    .palette{display:flex;gap:10px;margin-top:22px;position:relative}
    .swatch{height:52px;flex:1;border-radius:16px;border:1px solid rgba(0,0,0,.08);display:flex;align-items:end;padding:8px;font-size:11px;font-weight:800;color:#fff;box-shadow:inset 0 -20px 30px rgba(0,0,0,.12)}
    .swatch:nth-child(1){background:#d6281f}.swatch:nth-child(2){background:#F7F6F0;color:#000}.swatch:nth-child(3){background:#000}
    .tabs-wrap{position:sticky;top:0;z-index:18;margin:0 -22px 28px;padding:14px 22px;background:linear-gradient(to bottom,rgba(247,246,240,.96),rgba(247,246,240,.78));backdrop-filter:blur(18px);border-block:1px solid rgba(0,0,0,.06)}
    .tabs{max-width:1180px;margin:auto;display:flex;gap:10px;overflow:auto;padding-bottom:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
    .tab{border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.58);color:var(--black);border-radius:999px;padding:12px 18px;font-weight:850;cursor:pointer;white-space:nowrap;transition:transform .25s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease;letter-spacing:.01em;position:relative;overflow:hidden}
    .tab:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.42),transparent);transform:translateX(-120%);transition:.5s ease}
    .tab:hover:after{transform:translateX(120%)}
    .tab:hover{transform:translateY(-2px);border-color:rgba(214,40,31,.45)}
    .tab.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 16px 38px rgba(214,40,31,.25)}
    .panel{display:none;animation:fadeUp .52s cubic-bezier(.2,.8,.2,1) both}.panel.active{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .panel-head{display:flex;justify-content:space-between;gap:20px;align-items:end;margin:28px 0 22px}
    .panel-title h2{font-size:clamp(28px,4vw,48px);line-height:1;margin:0 0 8px;letter-spacing:-.04em}.panel-title p{margin:0;color:var(--muted);line-height:1.7;max-width:760px}.preview-note{display:inline-block;margin-top:6px;color:var(--red);font-weight:850}
    .badge{border:1px solid rgba(214,40,31,.28);color:var(--red);padding:9px 12px;border-radius:999px;font-weight:900;background:rgba(255,255,255,.6);white-space:nowrap;font-size:13px}
    .gallery{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
    .shot{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:28px;padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:.28s ease;cursor:zoom-in}
    .shot:hover{transform:translateY(-6px);box-shadow:0 34px 90px rgba(0,0,0,.2)}
    .shot:before{content:attr(data-side);position:absolute;left:24px;top:24px;z-index:2;background:rgba(0,0,0,.72);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;letter-spacing:.1em}
    .shot img{display:block;width:100%;height:auto;border-radius:18px;background:#eee;aspect-ratio:5/9;object-fit:cover;transition:transform .42s cubic-bezier(.2,.8,.2,1), filter .42s ease}
    .shot figcaption{position:relative;z-index:4;display:flex;justify-content:center;margin-top:14px}.shot button.badge{cursor:pointer;font-family:inherit}
    .shot:hover img{transform:scale(1.025);filter:contrast(1.03)}
    .shot:after{content:"點擊放大";position:absolute;right:24px;bottom:74px;z-index:2;background:rgba(214,40,31,.92);color:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;opacity:0;transform:translateY(8px);transition:.25s ease}
    .shot:hover:after{opacity:1;transform:none}
    .other-grid{display:grid;grid-template-columns:minmax(260px,520px) 1fr;gap:28px;align-items:start}
    .other-shot img{aspect-ratio:auto;max-height:76vh;object-fit:contain;background:#fff}
    .other-copy{border-radius:28px;padding:28px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);position:sticky;top:150px}.other-copy h3{font-size:30px;margin:0 0 12px}.other-copy p{color:var(--muted);line-height:1.8}.mini-list{display:grid;gap:10px;margin-top:20px}.mini-list span{padding:12px 14px;border-radius:16px;background:#f3f3f3;font-weight:800}
    .in-view{animation:softReveal .7s cubic-bezier(.2,.8,.2,1) both}
    @keyframes softReveal{from{opacity:.35;transform:translateY(18px)}to{opacity:1;transform:none}}
    .lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.84);display:none;align-items:center;justify-content:center;padding:26px}.lightbox.open{display:flex}.lightbox img{max-width:min(92vw,980px);max-height:88vh;border-radius:18px;box-shadow:0 30px 90px rgba(0,0,0,.55);background:#fff}.close{position:fixed;right:24px;top:22px;border:0;background:#fff;color:#000;border-radius:999px;width:44px;height:44px;font-size:24px;cursor:pointer}.caption{position:fixed;left:24px;bottom:20px;color:#fff;font-weight:800;background:rgba(0,0,0,.4);padding:10px 14px;border-radius:999px}
    footer{border-top:1px solid var(--line);padding:30px 22px;color:var(--muted);text-align:center;font-size:14px}
    @media(max-width:860px){.hero,.gallery,.other-grid{grid-template-columns:1fr}.panel-head{align-items:flex-start;flex-direction:column}.tabs-wrap{top:0}.other-copy{position:static}.shot{border-radius:22px}}
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <div class="eyebrow">Effect Preview</div>
        <h1><span class="title-line">Macao MICE Plus</span><span class="title-line short">禮遇合作伙伴計劃</span></h1>
        <p class="subtitle">Macao MICE Plus 禮遇合作伙伴計劃</p>
        <p class="desc"><b>此方案為效果預覽方案</b></p>
        <button class="tab" type="button" data-download-all>批量下載全部方案</button>
      </div>
      <aside class="hero-card">
        <div class="preview-label"><b>Design Scheme Gallery</b>點選下方方案切換預覽；點擊圖片可放大查看細節。主色方案：紅 #d6281f / 灰 #F7F6F0 / 黑 #000000。</div>
        <div class="palette"><div class="swatch">#d6281f</div><div class="swatch">#F7F6F0</div><div class="swatch">#000000</div></div>
      </aside>
    </section>

    <section class="tabs-wrap">
      <div class="tabs" role="tablist" aria-label="方案選擇">
        <button class="tab active" data-target="v01">方案 01</button>
        <button class="tab" data-target="v02">方案 02</button>
        <button class="tab" data-target="v03">方案 03</button>
        <button class="tab" data-target="v04">方案 04</button>
        <button class="tab" data-target="v05">方案 05</button>
      </div>
    </section>

    <section id="content"></section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" type="button" aria-label="關閉">×</button>
    <img src="" alt="放大預覽">
    <div class="caption"></div>
  </div>

  <footer>此方案為效果預覽方案 · Macao MICE Plus 禮遇合作伙伴計劃</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const schemes = [
      {id:'v01', title:'方案 01', note:'Macao MICE Plus 禮遇合作伙伴計劃方案預覽。', a:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-01-1-A.png', b:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-01-1-B.png'},
      {id:'v02', title:'方案 02', note:'Macao MICE Plus 禮遇合作伙伴計劃方案預覽。', a:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-02-1-A.png', b:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-02-1-B.png'},
      {id:'v03', title:'方案 03', note:'Macao MICE Plus 禮遇合作伙伴計劃方案預覽。', a:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-03-1-A.png', b:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-03-1-B.png'},
      {id:'v04', title:'方案 04', note:'Macao MICE Plus 禮遇合作伙伴計劃方案預覽。', a:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-04-1-A.png', b:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-04-1-B.png'},
      {id:'v05', title:'方案 05', note:'Macao MICE Plus 禮遇合作伙伴計劃方案預覽。', a:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-05-1-A.png', b:'https://cms.ersinfotech.com/ersinfotech/wp-content/uploads/sites/11/2026/06/MICE-Guest-Privileges-05-1-B.png'}
    ];
    const content = document.getElementById('content');
    const fileName = url => decodeURIComponent(url.split('/').pop());

    function schemePanel(s){
      return `<article class="panel ${s.id==='v01'?'active':''}" id="${s.id}">
        <div class="panel-head"><div class="panel-title"><h2>${s.title}</h2><p>${s.note}<br><span class="preview-note">此方案為效果預覽方案</span></p></div><div class="badge">A/B Side Preview</div></div>
        <div class="gallery">
          <figure class="shot" data-side="SIDE A" data-caption="${s.title} · A 面"><img loading="lazy" src="${s.a}" alt="${s.title} A 面"><figcaption><button class="badge" type="button" data-download="${s.a}">下載 A 面</button></figcaption></figure>
          <figure class="shot" data-side="SIDE B" data-caption="${s.title} · B 面"><img loading="lazy" src="${s.b}" alt="${s.title} B 面"><figcaption><button class="badge" type="button" data-download="${s.b}">下載 B 面</button></figcaption></figure>
        </div>
      </article>`;
    }
    content.innerHTML = schemes.map(schemePanel).join('');

    document.querySelectorAll('.tabs .tab').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        const panel=document.getElementById(btn.dataset.target);
        panel.classList.add('active');
        panel.animate([{opacity:0,transform:'translateY(18px)'},{opacity:1,transform:'translateY(0)'}],{duration:420,easing:'cubic-bezier(.2,.8,.2,1)'});
        if(window.innerWidth<900) panel.scrollIntoView({behavior:'smooth',block:'start'});
      });
    });

    const lightbox = document.getElementById('lightbox');
    const lbImg = lightbox.querySelector('img');
    const caption = lightbox.querySelector('.caption');
    document.addEventListener('click', e=>{
      const shot = e.target.closest('.shot');
      if(e.target.closest('[data-download]')) return;
      if(shot){
        const img = shot.querySelector('img');
        lbImg.src = img.src;
        caption.textContent = shot.dataset.caption || img.alt;
        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden','false');
      }
      if(e.target.classList.contains('close') || e.target === lightbox){
        lightbox.classList.remove('open');
        lightbox.setAttribute('aria-hidden','true');
        lbImg.src = '';
      }
    });
    async function downloadImage(url){
      const response = await fetch(url, {mode:'cors'});
      if(!response.ok) throw new Error('download failed');
      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=objectUrl;
      a.download=fileName(url);
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(()=>URL.revokeObjectURL(objectUrl),1000);
    }
    document.addEventListener('click', e=>{
      const btn=e.target.closest('[data-download]');
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      downloadImage(btn.dataset.download);
    });
    async function downloadAllZip(btn){
      if(typeof JSZip === 'undefined'){
        alert('ZIP 下載組件載入失敗，請檢查網絡後重試。');
        return;
      }
      const originalText=btn.textContent;
      btn.textContent='正在打包下載...';
      btn.disabled=true;
      try{
        const zip=new JSZip();
        const files=schemes.flatMap(s=>[
          {url:s.a, name:`${s.title.replace(' ','-')}-A.png`},
          {url:s.b, name:`${s.title.replace(' ','-')}-B.png`}
        ]);
        for(const file of files){
          const response=await fetch(file.url,{mode:'cors'});
          if(!response.ok) throw new Error(file.url);
          zip.file(file.name, await response.blob());
        }
        const blob=await zip.generateAsync({type:'blob'});
        const objectUrl=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=objectUrl;
        a.download='Macao-MICE-Plus-禮遇合作伙伴計劃.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(()=>URL.revokeObjectURL(objectUrl),1000);
      }catch(err){
        alert('批量打包失敗，可能是圖片服務器限制跨域下載。');
      }finally{
        btn.textContent=originalText;
        btn.disabled=false;
      }
    }
    document.querySelector('[data-download-all]').addEventListener('click',e=>{
      downloadAllZip(e.currentTarget);
    });
    const observer=new IntersectionObserver(entries=>entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add('in-view')}),{threshold:.18});
    document.querySelectorAll('.shot,.hero-card,.panel-head').forEach(el=>observer.observe(el));
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') lightbox.querySelector('.close').click(); });
  </script>
</body>
</html>
